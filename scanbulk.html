<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>QR Scanner (Pukal)</title>

<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/qr-scanner/qr-scanner.umd.min.js"></script>

</head>

<body>

<div class="container">

<h2>e-Hadir Digital Sikar</h2>

<div class="card">

<video
  id="video"
  playsinline
  autoplay
  muted
  style="width:100%;max-width:500px;">
</video>

<div id="hasil">
    Sedia untuk scan...
</div>

<div class="status">

<div>
Jumlah Scan :
<span id="total">0</span>
</div>

<div>
Queue :
<span id="queueCount">0</span>
</div>

<div>
Sending :
<span id="sendingCount">0</span>
</div>

</div>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Bil</th>
<th>ID</th>
<th>Nama</th>
<th>Kelas</th>
<th>Status</th>
<th>Masa</th>

</tr>

</thead>

<tbody id="scanTable">

</tbody>

</table>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/queue.js"></script>
<script src="js/ui.js"></script>
<script src="js/process.js"></script>
<script src="js/scanner.js"></script>

</body>

</html>
